---
layout: default
---

<div class="posts">
  {% for post in site.posts %}
    <article class="post">

      <h1><a href="{{ site.baseurl }}{{ post.url }}" class="read-more"> {{ post.title }} </a></h1>
       <p>{{ post.description_text }}<p>     
 	<div>
	<span>Posted on </span><span class="post-meta">{{ post.date | date: "%B %-d, %Y" }}</span>
					</div>
  <div class="entry-content">
{{ post.summary }}
       <p>
	            <a class="post-link" href="{{ post.url | prepend: site.baseurl }}">Read More &raquo;</a>
	          </p>
	    <span class="entry-tags">{% for tag in page.tags %}<a href="{{ site.url }}/tags#{{ tag }}" title="Pages tagged {{ tag }}" class="tag"><span class="term">{{ tag }}</span></a>{% unless forloop.last %}{% endunless %}{% endfor %}</span>
  </div><!-- /.entry-content -->

      <div class="entry">
        <!-- {{ post.excerpt }} -->
      </div>

      <!-- <a href="{{ site.baseurl }}{{ post.url }}" class="read-more">(...)</a> -->
    </article>
  {% endfor %}
</div>
